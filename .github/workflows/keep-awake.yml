name: keep-awake

on:
  schedule:
    - cron: '*/5 * * * *'    # 每 5 分钟运行一次
  workflow_dispatch:         # 可手动触发

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: curl site to keep awake
        run: |
          curl -fsS --max-time 10 https://finance-system-fytq.onrender.com || true
